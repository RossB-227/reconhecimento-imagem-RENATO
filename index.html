<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Renato Rossato Bini</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- TensorFlow + Teachable Machine -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
    }

    .main-box {
      max-width: 600px;
      margin: auto;
      margin-top: 40px;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    #webcam-container canvas {
      width: 100% !important;
      border-radius: 12px;
      border: 2px solid #38bdf8;
    }

    .progress {
      height: 18px;
      background-color: #1e293b;
    }

    .progress-bar {
      font-size: 12px;
      transition: width 0.3s ease;
    }

    .btn-camera {
      background: linear-gradient(45deg, #22c55e, #4ade80);
      border: none;
      font-weight: bold;
      padding: 12px 20px;
      border-radius: 50px;
      color: #022c22;
      transition: 0.3s;
    }

    .btn-camera:hover {
      transform: scale(1.08);
      box-shadow: 0 0 15px #22c55e;
    }

    .title {
      font-weight: 700;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

<div class="container main-box">
  <div class="glass text-center">
    <h2 class="title mb-3">🤖 Classificador de Imagem</h2>
    <p class="mb-4">Clique abaixo para liberar a câmera</p>

    <button class="btn btn-camera mb-4" onclick="init()">
      ▶ Iniciar Câmera
    </button>

    <div id="webcam-container" class="mb-4"></div>

    <div id="label-container"></div>
  </div>
</div>

<script>
  const URL = "https://teachablemachine.withgoogle.com/models/8GT05J9VU/";

  let model, webcam, labelContainer, maxPredictions;

  async function init() {
    const modelURL = URL + "model.json";
    const metadataURL = URL + "metadata.json";

    model = await tmImage.load(modelURL, metadataURL);
    maxPredictions = model.getTotalClasses();

    webcam = new tmImage.Webcam(350, 350, true);
    await webcam.setup();
    await webcam.play();
    window.requestAnimationFrame(loop);

    const container = document.getElementById("webcam-container");
    container.innerHTML = "";
    container.appendChild(webcam.canvas);

    labelContainer = document.getElementById("label-container");
    labelContainer.innerHTML = "";

    for (let i = 0; i < maxPredictions; i++) {
      const wrapper = document.createElement("div");
      wrapper.className = "mb-3 text-start";

      wrapper.innerHTML = `
        <div class="d-flex justify-content-between small mb-1">
          <span id="label-${i}">Classe</span>
          <span id="percent-${i}">0%</span>
        </div>
        <div class="progress rounded-pill">
          <div id="bar-${i}" class="progress-bar bg-info rounded-pill" style="width:0%">0%</div>
        </div>
      `;

      labelContainer.appendChild(wrapper);
    }
  }

  async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
  }

  async function predict() {
    const prediction = await model.predict(webcam.canvas);

    prediction.forEach((p, i) => {
      const percent = (p.probability * 100).toFixed(1);

      document.getElementById(`label-${i}`).innerText = p.className;
      document.getElementById(`percent-${i}`).innerText = percent + "%";

      const bar = document.getElementById(`bar-${i}`);
      bar.style.width = percent + "%";
      bar.innerText = percent + "%";

      // muda cor dinamicamente
      if (percent > 70) {
        bar.className = "progress-bar bg-success rounded-pill";
      } else if (percent > 40) {
        bar.className = "progress-bar bg-warning rounded-pill";
      } else {
        bar.className = "progress-bar bg-danger rounded-pill";
      }
    });
  }
</script>

</body>
</html>
